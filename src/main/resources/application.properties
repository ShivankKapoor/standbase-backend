spring.application.name=standbase
spring.security.user.name=unused
spring.security.user.password=unused
server.port=${SERVER_PORT:5554}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5555}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# DB Connection Details
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/standbase}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Discord info
discord.webhook.url=${DISCORD_WEBHOOK:}

# ENV
application.env=${ENV:}

# Meridian location service
meridian.base-url=${MERIDIAN_BASE_URL}